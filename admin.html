<button data-exam="SSS1_CHEM" onclick="openConfig('SSS1_CHEM')">SSS1 Chemistry</button>

<button data-exam="SSS1_GOV" onclick="openConfig('SSS1_GOV')">SSS1 Govrnment</button>

<button data-exam="SSS1_CIVIC" onclick="openConfig('SSS1_CIVIC')">SSS1 Civic Education</button>

<button data-exam="SSS1_GEO" onclick="openConfig('SSS1_GEO')">SSS1 Geography</button>

<button data-exam="SSS2_BIO" onclick="openConfig('SSS2_BIO')">SSS2 Biology</button>

<button data-exam="SSS2_AGRIC" onclick="openConfig('SSS2_AGRIC')">SSS2 Agricultural science</button>

<button data-exam="SSS2_CHEM" onclick="openConfig('SSS2_CHEM')">SSS2 Chemistry</button>

<button data-exam="SSS2_ECO" onclick="openConfig('SSS2_ECO')">SSS2 Economics</button>

<button data-exam="SSS2_GEO" onclick="openConfig('SSS2_GEO')">SSS2 Geography</button>

<button data-exam="SSS2_DT" onclick="openConfig('SSS2_DT')">SSS2 Digtal Technology</button>

</div>


<div id="configBox" style="display:none">

<h3 id="examTitle"></h3>

<label>Password</label>
<br>
<input type="text" id="examPassword">

<br><br>

<label>Time (Minutes)</label>
<br>
<input type="number" id="examTime">

<br><br>

<label>Enable Exam</label>
<input type="checkbox" id="examEnable">

<br><br>

<button onclick="saveExam()">Save</button>

</div>


<script>

let currentExam="";


function openConfig(exam){

currentExam=exam;

document.getElementById("configBox").style.display="block";

document.getElementById("examTitle").innerHTML=exam;

let settings=JSON.parse(localStorage.getItem(exam));

if(settings){

document.getElementById("examPassword").value=settings.password;
document.getElementById("examTime").value=settings.time;
document.getElementById("examEnable").checked=settings.enabled;

}

}


function saveExam(){

let pass=document.getElementById("examPassword").value;

let time=document.getElementById("examTime").value;

let enabled=document.getElementById("examEnable").checked;

let settings={

password:pass,
time:time,
enabled:enabled

};

localStorage.setItem(currentExam,JSON.stringify(settings));

alert("Exam settings saved");

}
function updateButtonColors(){

  let buttons=document.querySelectorAll(".adminGrid button");

  buttons.forEach(btn=>{
    let examID = btn.getAttribute("data-exam"); // Use data-exam
    let settings = JSON.parse(localStorage.getItem(examID));

    if(settings && settings.enabled){
      btn.style.background="#28a745"; // Green
    } else {
      btn.style.background="#dc3545"; // Red
    }
  });

}

// Call it once when admin panel loads
updateButtonColors();
</script>

</body>
